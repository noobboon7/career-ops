name: Sync Fork With Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream/main
        run: |
          git remote add upstream https://github.com/santifer/career-ops.git
          git fetch upstream main
          if git merge-base --is-ancestor HEAD upstream/main; then
            git merge --ff-only upstream/main
          else
            git merge --no-edit -m "chore: sync with upstream santifer/career-ops" upstream/main
          fi
          git push origin main
