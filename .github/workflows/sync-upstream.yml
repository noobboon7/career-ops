name: Sync Fork With Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream/main (keep fork's workflow files)
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/santifer/career-ops.git
          git fetch upstream main

          # The automatic GITHUB_TOKEN is not permitted to push changes under
          # .github/workflows/. Merge everything from upstream EXCEPT workflow
          # files, which we keep at the fork's current version so the push is
          # accepted. (If you ever want upstream's workflow files mirrored too,
          # add a SYNC_PAT secret with the 'workflow' scope and delete the
          # "keep fork's workflow files" block below.)
          git merge --no-commit --no-ff --no-edit upstream/main || true

          if ! git rev-parse -q --verify MERGE_HEAD >/dev/null; then
            echo "Already up to date with upstream; nothing to do."
            exit 0
          fi

          # Restore the fork's own workflow files (covers upstream modify/delete)...
          git checkout HEAD -- .github/workflows 2>/dev/null || true
          # ...and drop any workflow files that upstream newly added in this merge.
          git diff --cached --name-only --diff-filter=A -- .github/workflows |
            while IFS= read -r f; do
              git reset -q HEAD -- "$f" && rm -f "$f"
            done

          git commit --no-edit \
            -m "chore: sync with upstream santifer/career-ops (workflow files skipped)"
          git push origin main
